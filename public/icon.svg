  <rect x="180" y="258" width="140" height="16" rx="6" fill="white" opacity="0.9"/>
  <rect x="180" y="310" width="180" height="16" rx="6" fill="white" opacity="0.7"/>
  <rect x="180" y="344" width="160" height="16" rx="6" fill="white" opacity="0.7"/>
